<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="CAUSE Creative Studio — استوديو إبداعي متخصص في إنتاج الأفلام والإعلانات والموشن جرافيك">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>CAUSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#060d1a;--cyan:#00e5a0;--white:#fff;--muted:rgba(255,255,255,.4)}
html,body{width:100%;height:100%;background:var(--navy);overflow:hidden;font-family:'IBM Plex Sans Arabic',sans-serif}
body{display:flex;align-items:center;justify-content:center}

.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,160,.05) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}

.corner{position:fixed;width:28px;height:28px;opacity:0;animation:fadein .5s ease .2s forwards}
.corner::after{content:'';position:absolute;width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.corner--tl{top:24px;left:24px;border-top:1px solid rgba(0,229,160,.3);border-left:1px solid rgba(0,229,160,.3)}
.corner--tl::after{top:-3px;left:-3px}
.corner--tr{top:24px;right:24px;border-top:1px solid rgba(0,229,160,.3);border-right:1px solid rgba(0,229,160,.3)}
.corner--tr::after{top:-3px;right:-3px}
.corner--bl{bottom:24px;left:24px;border-bottom:1px solid rgba(0,229,160,.3);border-left:1px solid rgba(0,229,160,.3)}
.corner--bl::after{bottom:-3px;left:-3px}
.corner--br{bottom:24px;right:24px;border-bottom:1px solid rgba(0,229,160,.3);border-right:1px solid rgba(0,229,160,.3)}
.corner--br::after{bottom:-3px;right:-3px}

.scene{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center}

/* ── LOGO WRAP: pivot from bottom-left so C base stays grounded ── */
.logo-wrap{
  position:relative;
  display:inline-block;
  transform-origin: center center;
}

.logo-img{
  width:clamp(196px,35vw,434px);
  height:auto;
  display:block;
  opacity:0;
}

/* ── IMPACT FLASH — cyan glow burst on C letter ── */
.impact-flash{
  position:absolute;
  width:60px; height:60px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,229,160,0.9) 0%, rgba(0,229,160,0.4) 40%, transparent 70%);
  left:9%; top:0;
  transform:translate(-50%, -50%) scale(0);
  opacity:0;
  pointer-events:none;
}

/* ── BALL ── */
.ball{
  position:absolute;
  width:13px; height:13px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 12px 4px rgba(0,229,160,.9),0 0 28px 8px rgba(0,229,160,.4);
  left:9%;
  top:-130px;
  transform:translateX(-50%);
  opacity:0;
  pointer-events:none;
}

.location-tag{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-top:20px;margin-bottom:28px;opacity:0;transform:translateY(8px);animation:rise .7s ease 3.2s forwards}
.location-tag .sep{color:rgba(255,255,255,.15)}
.location-tag .pill{border:1px solid rgba(0,229,160,.4);color:var(--cyan);padding:2px 10px 1px;border-radius:100px;font-size:10px;letter-spacing:.3em}

.tagline-ar{font-size:clamp(18px,3.5vw,38px);font-weight:700;color:var(--white);direction:rtl;opacity:0;transform:translateY(10px);animation:rise .8s ease 3.6s forwards;margin-bottom:5px}
.tagline-ar .accent{color:var(--cyan)}
.tagline-sub{font-size:clamp(11px,1.5vw,14px);font-weight:300;color:var(--muted);direction:rtl;opacity:0;transform:translateY(6px);animation:rise .8s ease 4s forwards;margin-bottom:40px}

.progress-wrap{width:min(240px,55vw);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fadein .6s ease 2.4s forwards}
.progress-track{width:100%;height:2px;background:rgba(0,229,160,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--cyan);box-shadow:0 0 10px rgba(0,229,160,.5);width:0;animation:load 4.5s cubic-bezier(.4,0,.2,1) 1s forwards}
@keyframes load{0%{width:0}20%{width:16%}55%{width:56%}80%{width:78%}95%{width:92%}100%{width:100%}}
.progress-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:.5em;color:rgba(0,229,160,.4);display:flex;align-items:center;gap:8px}
.progress-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.bottom-meta{position:fixed;bottom:26px;width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 30px;opacity:0;animation:fadein .6s ease .4s forwards}
.meta{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:.4em;color:rgba(255,255,255,.18);display:flex;align-items:center;gap:8px}
.dot-s{width:5px;height:5px;border-radius:50%;border:1px solid var(--cyan)}

@keyframes fadein{to{opacity:1}}
@keyframes rise{to{opacity:1;transform:translateY(0)}}

.overlay{position:fixed;inset:0;background:var(--navy);z-index:50;opacity:0;pointer-events:none;transition:opacity .6s ease}
.overlay.out{opacity:1}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="scene">
  <div class="logo-wrap" id="logoWrap">
    <div class="ball" id="ball"></div>
    <div class="impact-flash" id="flash"></div>
    <img class="logo-img" id="logo" src="images/loading_logo.png" alt="CAUSE"/>
  </div>
  <div class="location-tag">
    <span>RIYADH</span><span class="sep">·</span>
    <span>CAUSE.SA</span><span class="sep">·</span>
    <span class="pill">CREATIVE STUDIO</span>
  </div>
  <div class="tagline-ar">نبدع <span class="accent">معك</span></div>
  <div class="tagline-sub">في كوز، الإبداع هو الأساس، والتأثير هو الغاية.</div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-label">LOADING</div>
  </div>
</div>

<div class="bottom-meta">
  <div class="meta">© 2025 CAUSE</div>
  <div class="meta">SHOWREEL <div class="dot-s"></div></div>
</div>
<div class="overlay" id="overlay"></div>

<script>
const logo  = document.getElementById('logo');
const ball  = document.getElementById('ball');
const wrap  = document.getElementById('logoWrap');
const flash = document.getElementById('flash');

function easeInQuart(t){ return t*t*t*t; }
function easeOutBack(t){
  const c1=1.70158, c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}
function lerp(a,b,t){ return a+(b-a)*t; }

function animate(duration, fn, onDone){
  const start=performance.now();
  (function step(now){
    const t=Math.min((now-start)/duration,1);
    fn(t);
    if(t<1) requestAnimationFrame(step);
    else if(onDone) onDone();
  })(performance.now());
}

// ── 1. Logo fades in at 500ms — perfectly straight ──
setTimeout(()=>{
  animate(380, t=>{
    logo.style.opacity = (t<1 ? t*t*(3-2*t) : 1).toFixed(3); // smoothstep
    wrap.style.transform = 'rotate(0deg)';
  });
}, 500);

// ── 2. Ball drops from above onto C letter at 1200ms ──
setTimeout(()=>{
  const logoH = logo.offsetHeight || 80;
  // Ball travels from top:-130px to top:0 (surface of logo)
  const startY = -130;
  const endY   = -7; // resting on top of logo

  animate(600, t=>{
    // gravity acceleration
    const ease = easeInQuart(t);
    const y    = lerp(startY, endY, ease);

    // squash on impact (last 12%)
    let sx=1, sy=1;
    if(t > 0.88){
      const imp=(t-0.88)/0.12;
      sx = 1 + imp*0.6;
      sy = 1 - imp*0.5;
    }

    // opacity: pop in at start, stay, then stay visible until impact done
    const op = t < 0.08 ? t/0.08 : 1;

    ball.style.top       = y+'px';
    ball.style.opacity   = op.toFixed(3);
    ball.style.transform = `translateX(-50%) scale(${sx.toFixed(2)},${sy.toFixed(2)})`;
  }, ()=>{
    // Impact reached — trigger flash + logo tilt
    triggerImpact();
  });
}, 1200);

function triggerImpact(){
  // Hide ball
  ball.style.opacity = '0';

  // ── Flash burst ──
  animate(500, t=>{
    const scale = t < 0.3 ? lerp(0,1.8,t/0.3) : lerp(1.8,0.3,(t-0.3)/0.7);
    const op    = t < 0.25 ? 1 : lerp(1,0,(t-0.25)/0.75);
    flash.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(2)})`;
    flash.style.opacity   = op.toFixed(3);
  });

  // ── Logo tilts and STAYS tilted ──
  // Small delay (60ms) so flash registers first
  setTimeout(()=>{
    animate(700, t=>{
      let angle;
      if(t < 0.55){
        // swing to -11deg with easeOutBack (slight overshoot then settles)
        angle = lerp(0, -7, easeOutBack(t/0.55));
      } else {
        // tiny wobble: overshoot then settle to -10deg final
        const sub=(t-0.55)/0.45;
        const wobble = Math.sin(sub*Math.PI*2)*1.2*(1-sub);
        angle = -7 + wobble;
      }
      wrap.style.transform = `rotate(${angle.toFixed(2)}deg)`;
      logo.style.opacity   = '1';
    }, ()=>{
      // Lock at final tilt angle permanently
      wrap.style.transform = 'rotate(-6deg)';
    });
  }, 60);
}

// Auto-enter
setTimeout(()=>{ goToSite(); }, 6000);
document.body.addEventListener('click',()=>{ goToSite(); });
var navigating = false;
function goToSite(){
  if(navigating) return;
  navigating = true;
  var ov = document.getElementById('overlay');
  if(ov) ov.classList.add('out');
  setTimeout(()=>{ window.location.href = 'main.html'; }, 1000);
}
</script>
</body>
</html>
